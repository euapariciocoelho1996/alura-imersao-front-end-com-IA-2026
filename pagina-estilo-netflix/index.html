<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Perfis</title>
  </head>

  <body>
    <main class="selecao-perfis">
      <header>
        <h1>Quem está assistindo?</h1>
      </header>

      <section aria-label="Seleção de perfis">
        <ul class="lista-perfis">
          <li>
            <article class="perfil">
              <img src="./assets/perfil01.png" alt="Perfil do usuário 1" />
              <h2>Perfil 1</h2>
            </article>
          </li>

          <li>
            <article class="perfil">
              <img src="./assets/perfil02.png" alt="Perfil do usuário 2" />
              <h2>Perfil 2</h2>
            </article>
          </li>

          <li>
            <article class="perfil">
              <img
                src="./assets/perfil-infantil.png"
                alt="Perfil do usuário 3"
              />
              <h2>Perfil 3</h2>
            </article>
          </li>

          <li>
            <article class="geren-p">
              <div class="img-hover">
                <img
                  src="./assets/add-perfil.png"
                  alt="Adicionar novo perfil"
                />
              </div>

              <h2>Adicionar perfil</h2>
            </article>
          </li>
        </ul>
      </section>
      <div class="gerenciar-perfis">
        <p>Gerenciar Perfis</p>
      </div>
    </main>
  </body>
</html>
